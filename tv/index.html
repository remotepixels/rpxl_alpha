<script lang="javascript">
	const APP_NS = 'tv-RPXL';

	const smartTV = generateRandomID(8).toUpperCase();;
	scode.textContent = smartTV.replace(/(.{4})(.{4})/, "$1-$2");

	let vdo, vdoTV;
	const config = {
		salt: "rpxl.app",
		allowFallback: false,
		debug: false
	};

	vdo = new VDONinjaSDK(config);
	vdoTV = new VDONinjaSDK(config);

	randomBG (); 

	setupVDOTVListeners();

	vdoTV.autoConnect({
		room: smartTV,
		mode: "half",	//data only
		password: ""
	});


	function setupVDOTVListeners() {
		vdoTV.addEventListener(`connected`, (event) => {
			console.log("connected to signaling server");
		});

		vdoTV.addEventListener(`disconnected`, (event) => {
			console.log("disconnected to signaling server");
		});

		vdoTV.addEventListener(`roomJoined`, (event) => {
			console.log("Waiting @ :", event.detail.room);
		});

		vdoTV.addEventListener('peerConnected', (event) => {		//NOTE! vdoMS
		const uuid = event.detail.uuid;

		console.warn("Somebody joined, waiting commands", uuid);
		});

		vdoTV.addEventListener("peerInfo", (event) => {
		//comes later will contain the peer label (username) but not tracks
		const uuid = event.detail.uuid;
		});
		
		vdoTV.addEventListener('dataChannelOpen', (event) => {
			//RUNS - ONCE FOR DATA, ONCE FOR VIDEO/AUDIO

		});

		vdoTV.addEventListener('dataReceived', (event) => {
			const data = event.detail.data;

			if (data.type === 'migrate') {
				const moveToRoom = data.roomid;

				console.log("Recieved migrate command will now join session", moveToRoom);

				joinMainSession(moveToRoom)
			}
		});

	}

	function joinMainSession (moveToRoom) {
		vdoTV.sendData({
			type: "ack-migrate"
		});

		vdoTV.disconnect();

		popup.classList.add("hidden");
		body.style.backgroundImage = "none";
		body.style.background = "#222222"

		//console.log(vdoTV);

		wait(300);

		setupVDOListeners();

		vdo.autoConnect({
			room: moveToRoom,
			mode: "full"
		});

	}

function setupVDOListeners() {
		vdo.addEventListener(`connected`, (event) => {
			console.log("connected to signaling server");
		});

		vdo.addEventListener(`disconnected`, (event) => {
			console.log("disconnected to signaling server");
		});

		vdo.addEventListener(`roomJoined`, (event) => {
			console.log("joined :", event.detail.room);
		});

		vdo.addEventListener('peerConnected', (event) => {		
			
		});

		vdo.addEventListener("peerInfo", (event) => {

		});
		
		vdo.addEventListener('dataChannelOpen', (event) => {

		});

		vdo.addEventListener('dataReceived', (event) => {

		});

		vdo.addEventListener("track", (event) => {
		const streamID = event.detail.streamID || null;
		const track = event.detail.track || null;

		if (streamID.startsWith("ms_")) { 
			//console.log("main stream Info:", streamID, track)
			showMainStream(streamID, track);
		}
	});

}

function showMainStream(streamID, track) {
	app.classList.remove("hidden");
	const mainViewer = document.getElementById('mainStream');

	if (!mainViewer.srcObject) {
		mainViewer.srcObject = new MediaStream();
	}

	const stream = mainViewer.srcObject;

	stream.addTrack(track);	

}

</script>
