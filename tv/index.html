			</div>
			<!-- main toolbar -->
			<div class="toolbar horiz fade" id="mainToolBar">

					<button class="tool" id="toolPalette" data-ui="popover" data-target="colorPalette" data-requires="video" aria-expanded="false"><span class="material-symbols-outlined">palette</span></button>
					<button class="tool" id="toolEraser" data-ui="action" data-action="eraseTool" data-requires="video" aria-pressed="false"><span class="material-symbols-outlined">ink_eraser</span></button>
				</div>
				<div class="tool spacer" data-requires="audio" ></div>
				<div class="tool-set">
					<span class="tool material-symbols-outlined volume-icon disabled" id="iconVolume" data-requires="audio">volume_down</span>
					<span class="tool volume" id="toolVolume disabled" data-requires="audio"><input type="range" id="toolStreamVolume" value="10" min="0" max="100" /></span>
				</div>
			</div>
		</div>
	</div>

		<div id="popup" class="dialog middle warning">

			Smart TV connect code

<script lang="javascript">
	const APP_NS = 'tv-RPXL';

	const smartTV = generateRandomID(8).toUpperCase();;
	scode.textContent = smartTV.replace(/(.{4})(.{4})/, "$1-$2");

	let vdo, vdoTV;
	const config = {
		salt: "rpxl.app",
		allowFallback: false,
		debug: false
	};

	vdo = new VDONinjaSDK(config);
	vdoTV = new VDONinjaSDK(config);

	randomBG (); 

	vdoTV.autoConnect({
		room: smartTV,
		mode: "half",	//data only
		password: ""
	});

	vdoTV.addEventListener(`roomJoined`, (event) => {
		console.log("in holding pattern, waiting for host @ ",event.detail.room);
	});

	vdoTV.addEventListener('dataReceived', (event) => {
	const uuid = event.detail.uuid;
	const data = event.detail.data;

	//console.warn('control message waiting room:', event);
	if (data.dataType === "migrate") {
		mainRoom = data.roomid;

		console.log("recieved main room :", mainRoom);
		
		vdoTV.sendData({
			dataType: 'peer-disconnect',
			timestamp: Date.now()
		});

		vdoTV.disconnect();

		document.getElementById("popup").classList.add("hidden");

		wait(500); 

		vdo.autoConnect({
			room: mainRoom,
			mode: "full",	//video etc
			password: ""
		});

	}
});

</script>
